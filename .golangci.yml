version: "2"

run:
  timeout: 30m
  tests: true
  go: "1.25"

linters:
  default: none
  enable:
    - asasalint
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - gocheckcompilerdirectives
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - intrange
    - iotamixing
    - lll
    - makezero
    - mirror
    - misspell
    - modernize
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - reassign
    - recvcheck
    - revive
    - staticcheck
    - thelper
    - unconvert
    - unused
    - usestdlibvars
    - wastedassign
    - testifylint
    - tparallel
    - usetesting
    - sloglint
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      severity: low
      confidence: low
    govet:
      enable-all: true
    staticcheck:
      checks: ["all"]
    revive:
      severity: warning
      rules:
        - name: exported
          severity: warning
        - name: var-naming
          severity: warning
        - name: package-comments
          severity: warning
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: bool-literal-in-expr
        - name: constant-logical-expr
    gocyclo:
      min-complexity: 10
    gocognit:
      min-complexity: 20
    funlen:
      lines: 65
      statements: 40
    goconst:
      min-len: 2
      min-occurrences: 4
    gomoddirectives:
      replace-local: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental
        - opinionated
    lll:
      line-length: 120
    misspell:
      locale: US
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    dupl:
      threshold: 150
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true
    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text: {}
  sort-order:
    - linter
    - file
  show-stats: true